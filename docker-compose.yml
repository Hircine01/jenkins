version: '3.8'

services:
  backend:
    image: hircine01/jenkins-backend:${VERSION:-latest}
    container_name: backend-api
    restart: always
    networks:
      - app-network
    environment:
      - VERSION=${VERSION:-latest}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  nginx:
    image: hircine01/jenkins-nginx:${VERSION:-latest}
    container_name: nginx-web
    restart: always
    ports:
      - "80:80"
    networks:
      - app-network
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/"]
      interval: 30s
      timeout: 3s
      retries: 3

networks:
  app-network:
    driver: bridge